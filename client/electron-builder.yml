appId: com.synclaw.app
productName: SynClaw
copyright: Copyright © 2026 SynClaw

# 使用本地 electron（避免访问 ~/Library/Caches/electron）
electronDist: node_modules/electron/dist

directories:
  buildResources: build
  output: release/latest

asar: true
compression: maximum

files:
  - dist/**/*
  - package.json
  - public/**/*
  - "!node_modules/**/*"
  - "node_modules/electron-store/**/*"
  - "node_modules/conf/**/*"
  - "node_modules/atomically/**/*"
  - "node_modules/dot-prop/**/*"
  - "node_modules/env-paths/**/*"
  - "node_modules/pkg-up/**/*"
  - "node_modules/find-up-simple/**/*"
  - "node_modules/ajv/**/*"
  - "node_modules/ajv-formats/**/*"

extraResources:
  - from: resources/openclaw-source
    to: openclaw-source
    filter:
      - "**/*"
      - "!.git/**/*"
      - "!**/.vscode/**/*"
  - from: ../web/.next/standalone
    to: web/standalone
    filter:
      - "**/*"
    # Graceful degradation: if web/ doesn't exist, the build still succeeds
  - from: public/icon.png
    to: icon.png

extraMetadata:
  main: dist/main/index.js

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: build/SynClaw.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Build Universal binary (arm64 + x64) for Apple Silicon and Intel Macs
  arch: [arm64, x64]
  # ── macOS Notarization (Apple 公证) ─────────────────────────────────
  # Requires APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  # See: .planning/phases/05-pack-ship/PLAN.md § Phase 2 (SIGN)
  # Set these via GitHub Secrets or local .env (never commit secrets)
  notarize: # electron-builder handles xcrun stapler + Transporter upload
    teamId: $APPLE_TEAM_ID
    appleId: $APPLE_ID
    appleIdPassword: $APPLE_APP_SPECIFIC_PASSWORD

win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
  artifactName: "${productName}-${version}-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SynClaw
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: SynClaw Team
  icon: build/icons/
  desktop:
    Name: SynClaw
    Comment: AI Agent Desktop Client
    Categories: Utility;Development;
    Keywords: ai;assistant;automation;agent;
  executableName: synclaw
