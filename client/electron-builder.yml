appId: com.synclaw.app
productName: SynClaw
copyright: Copyright © 2026 SynClaw

# Universal mac builds require architecture-specific Electron bundles.
# Let electron-builder resolve/download the correct artifact per arch.

directories:
  buildResources: build
  output: release/latest

asar: true
compression: maximum

files:
  - dist/**/*
  - package.json
  - public/**/*
  - "!node_modules/**/*"
  - "node_modules/electron-store/**/*"
  - "node_modules/conf/**/*"
  - "node_modules/atomically/**/*"
  - "node_modules/dot-prop/**/*"
  - "node_modules/env-paths/**/*"
  - "node_modules/pkg-up/**/*"
  - "node_modules/find-up-simple/**/*"
  - "node_modules/ajv/**/*"
  - "node_modules/ajv-formats/**/*"

extraResources:
  - from: resources/openclaw-source
    to: openclaw-source
    filter:
      - "**/*"
      - "!.git/**/*"
      - "!**/.vscode/**/*"
  - from: ../web/.next/standalone
    to: web/standalone
    filter:
      - "**/*"
    # Graceful degradation: if web/ doesn't exist, the build still succeeds
  - from: public/icon.png
    to: icon.png

extraMetadata:
  main: dist/main/main/index.js

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
    - target: zip
  icon: build/SynClaw.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # ── macOS Notarization (Apple 公证) ─────────────────────────────────
  # electron-builder 读取环境变量自动提交公证，无需在此硬编码凭证。
  # 必须环境变量：APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
  # 支持凭证集 A（Apple ID）：见下方注释
  # 支持凭证集 B（API Key）：设置 APPLE_API_KEY + APPLE_API_KEY_ID + APPLE_API_ISSUER
  # autoSubmit: true  — 构建完成后自动提交 Apple 公证，CI 中推荐使用
  # autoSubmit: false — 仅构建，CI workflow 中单独调用 scripts/notarize.mjs
  # See: https://www.electron.build/mac.html#notarize
  notarize:
    tool: notarytool

win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
  artifactName: "${productName}-${version}-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SynClaw
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: SynClaw Team
  icon: build/icons/
  desktop:
    Name: SynClaw
    Comment: AI Agent Desktop Client
    Categories: Utility;Development;
    Keywords: ai;assistant;automation;agent;
  executableName: synclaw
