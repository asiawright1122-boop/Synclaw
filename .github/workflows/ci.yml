name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: client

      - name: Type check
        run: pnpm exec tsc --noEmit
        working-directory: client

      - name: ESLint
        run: pnpm run lint
        working-directory: client

      - name: Unit tests
        run: pnpm test
        working-directory: client

  build-main:
    name: Build Main Process
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: client

      - name: Download OpenClaw
        run: node scripts/download-openclaw.mjs
        working-directory: client
        continue-on-error: true

      - name: Build main process
        run: node scripts/build-main.mjs
        working-directory: client

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: main-dist
          path: client/dist/main/**
          retention-days: 7

  build-renderer:
    name: Build Renderer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: client

      - name: Build renderer
        run: pnpm run build
        working-directory: client

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: renderer-dist
          path: client/dist/renderer/**
          retention-days: 7

  test-e2e:
    name: E2E Tests
    runs-on: macos-latest
    needs: [build-renderer]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: client

      - name: Download Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: client

      - name: Run E2E tests
        run: pnpm exec playwright test
        working-directory: client
        env:
          CI: 'true'
